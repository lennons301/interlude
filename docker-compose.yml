services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - app_data:/data
      - ${CLAUDE_CREDENTIALS_PATH:-/dev/null}:/home/node/.claude/.credentials.json:rw
    environment:
      - HOSTNAME=0.0.0.0

volumes:
  caddy_data:
  caddy_config:
  app_data:
